[supervisord]
logfile  = /tmp/supervisord.log
pidfile  = /tmp/supervisord.pid
nodaemon = true

; ─────────────────────────────────────────────────────────────────
; Flask API Server
; ─────────────────────────────────────────────────────────────────
[program:flask_app]
command         = python app.py
directory       = /home/deepakchp/Project/Trading/Option/tradeApp
autostart       = true
autorestart     = true
startretries    = 5
startsecs       = 3
stopwaitsecs    = 10
redirect_stderr = true
stdout_logfile  = /home/deepakchp/Project/Trading/Option/tradeApp/logs/flask_app.log
stdout_logfile_maxbytes = 50MB
stdout_logfile_backups  = 5

; ─────────────────────────────────────────────────────────────────
; Async Event Loop (Real-time tick processing, delta hedging)
; ─────────────────────────────────────────────────────────────────
[program:async_engine]
command         = python async_engine.py
directory       = /home/deepakchp/Project/Trading/Option/tradeApp
autostart       = true
autorestart     = true
startretries    = 5
startsecs       = 3
stopwaitsecs    = 10
redirect_stderr = true
stdout_logfile  = /home/deepakchp/Project/Trading/Option/tradeApp/logs/async_engine.log
stdout_logfile_maxbytes = 50MB
stdout_logfile_backups  = 5

; ─────────────────────────────────────────────────────────────────
; Celery Worker (non-critical background tasks: email, reconciliation)
; ─────────────────────────────────────────────────────────────────
[program:celery_worker]
command         = celery -A modules.tasks.celery_app worker --loglevel=info --concurrency=2
directory       = /home/deepakchp/Project/Trading/Option/tradeApp
autostart       = true
autorestart     = true
startretries    = 3
startsecs       = 5
stopwaitsecs    = 30
stopasgroup     = true
killasgroup     = true
redirect_stderr = true
stdout_logfile  = /home/deepakchp/Project/Trading/Option/tradeApp/logs/celery_worker.log
stdout_logfile_maxbytes = 50MB
stdout_logfile_backups  = 5

; ─────────────────────────────────────────────────────────────────
; Infrastructure Services (Redis and PostgreSQL)
; ─────────────────────────────────────────────────────────────────
[program:redis]
command         = redis-server --port 6379
autostart       = true
autorestart     = true
startretries    = 5
startsecs       = 2
priority        = 90     # Start before Python apps
redirect_stderr = true
stdout_logfile  = /tmp/redis_supervisord.log
stdout_logfile_maxbytes = 20MB

[program:postgres]
# Run postgres directly in the foreground so supervisord can track its PID
command         = sudo -u postgres /usr/lib/postgresql/16/bin/postgres -D /etc/postgresql/16/main -c config_file=/etc/postgresql/16/main/postgresql.conf
autostart       = true
autorestart     = true
startretries    = 5
startsecs       = 3
priority        = 90     # Start before Redis and Python apps
redirect_stderr = true
stdout_logfile  = /tmp/postgres_supervisord.log
stdout_logfile_maxbytes = 20MB

; ─────────────────────────────────────────────────────────────────
; Group — start/stop all processes together
; ─────────────────────────────────────────────────────────────────
[group:vrp_system]
programs = redis,postgres,flask_app,async_engine,celery_worker
priority = 999
